{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Admin | OpenHeart{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #770202, #2b0000);
  min-height: 100vh;
  color: white;
}

/* ===== ADMIN NAVBAR ===== */
.admin-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 75px;
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 3000;
  background: rgba(119,2,2,0.45);
  backdrop-filter: blur(14px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.logo-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-box img { height: 42px; }

.logo-box span {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
}

.admin-nav {
  display: flex;
  gap: 28px;
}

.admin-nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  position: relative;
}

.admin-nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -6px;
  width: 0%;
  height: 2px;
  background: white;
  transition: 0.3s;
}

.admin-nav a:hover::after { width: 100%; }

/* ===== PAGE CONTENT ===== */
.page-wrapper {
  padding: 120px 8% 60px;
}

/* reusable card */
.glass-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius: 26px;
  padding: 30px;
  box-shadow: 0 0 35px rgba(255,255,255,0.25);
}

/* buttons */
.btn {
  padding: 10px 18px;
  border-radius: 14px;
  border: none;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.3s ease;
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 18px rgba(255,255,255,0.7);
}

.btn-primary { background: white; color: #770202; }
.btn-danger  { background: #ff5252; color: white; }
.btn-info    { background: #2196f3; color: white; }

</style>

{% block extra_css %}{% endblock %}
</head>

<body>

<!-- ===== ADMIN NAVBAR ===== -->
<div class="admin-header">
  <div class="logo-box">
    <img src="{% static 'images/logo.png.jpeg' %}">
    <span>OpenHeart Admin</span>
  </div>

  <div class="admin-nav">
    <a href="{% url 'admin_dashboard' %}">Dashboard</a>
    <a href="{% url 'manage_users' %}">Users</a>
    <a href="{% url 'manage_organizers' %}">Organizers</a>
    <a href="{% url 'manage_events' %}">Events</a>
    <!-- <a href="{% url 'manage_media' %}">Gallery</a> -->
    <a href="{% url 'admin_logout' %}">Logout</a>
  </div>
</div>

<!-- ===== CONTENT ===== -->
<div class="page-wrapper">
  {% block content %}{% endblock %}
</div>

</body>
</html>
