{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}OpenHeart{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #770202, #2b0000);
  min-height: 100vh;
  color: white;
}

/* ===== NAVBAR ===== */

.nav-glass {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 75px;
  padding: 0 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 2000;

  background: rgba(119,2,2,0.30);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 10px 35px rgba(0,0,0,0.5);
}

/* left */

.nav-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-logo {
  height: 40px;
}

.nav-left span {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  white-space: nowrap;
}

/* right */

.nav-links {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;       /* prevents logout hiding */
  justify-content: flex-end;
}

.nav-links a {
  text-decoration: none;
  color: white;
  font-size: 14px;
  letter-spacing: 2px;
  position: relative;
  opacity: 0.9;
  white-space: nowrap;
  padding: 6px 4px;
}

/* underline animation */
.nav-links a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background: white;
  transition: 0.4s;
}

.nav-links a:hover::after {
  width: 100%;
}

/* logout button */
.nav-links a.logout-btn {
  padding: 7px 16px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.5);
}

.nav-links a.logout-btn::after {
  display: none;
}

.nav-links a.logout-btn:hover {
  background: white;
  color: #770202;
  box-shadow: 0 0 18px white;
}

/* push page below navbar */
.page-content {
  padding-top: 95px;
}

/* responsive */
@media (max-width: 700px) {
  .nav-left span {
    display: none;
  }

  .nav-links {
    gap: 14px;
  }

  .nav-links a {
    font-size: 12px;
    letter-spacing: 1px;
  }
}
</style>

{% block extra_css %}{% endblock %}
</head>

<body>

<!-- ===== NAVBAR ===== -->
<div class="nav-glass">
  <div class="nav-left">
    <img src="{% static 'images/logo.png.jpeg' %}" class="nav-logo">
    <span>OpenHeart</span>
  </div>

  <div class="nav-links">
    <a href="{% url 'user_dashboard' %}">Home</a>
    <a href="{% url 'view_programs' %}">Programs</a>
    <a href="{% url 'my_programs' %}">My Programs</a>
    <a href="{% url 'user_logout' %}" class="logout-btn">Logout</a>
  </div>
</div>

<!-- ===== PAGE CONTENT ===== -->
<div class="page-content">
  {% block content %}{% endblock %}
</div>

</body>
</html>
