{% extends "base_admin.html" %}
{% block title %}Add User | Admin{% endblock %}

{% block extra_css %}
<style>
.add-user-wrapper {
  max-width: 420px;
  margin: 40px auto;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(16px);
  padding: 30px 28px;
  border-radius: 20px;
  box-shadow: 0 0 35px rgba(255,255,255,0.25);
  text-align: center;
}

.add-user-wrapper h2 {
  margin-bottom: 25px;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(255,255,255,0.4);
}

.add-user-wrapper input {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
}

.add-user-wrapper input:focus {
  box-shadow: 0 0 12px white;
}

.add-user-wrapper button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: white;
  color: #770202;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.3s ease;
}

.add-user-wrapper button:hover {
  transform: scale(1.07);
  box-shadow: 0 0 25px white;
}
</style>
{% endblock %}

{% block content %}

<div class="add-user-wrapper">
  <h2>➕ Add User</h2>

  <form method="POST">
    {% csrf_token %}

    <input name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input name="phone" placeholder="Phone" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Add User</button>
  </form>
</div>

{% endblock %}
