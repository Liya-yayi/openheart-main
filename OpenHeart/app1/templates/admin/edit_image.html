{% extends "base_admin.html" %}
{% block title %}Edit Image | Admin{% endblock %}

{% block extra_css %}
<style>
.edit-image-wrapper {
  max-width: 520px;
  margin: 50px auto 100px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  padding: 30px;
  border-radius: 26px;
  box-shadow: 0 0 40px rgba(255,255,255,0.25);
  text-align: center;
}

.edit-image-wrapper h2 {
  margin-bottom: 22px;
  letter-spacing: 2px;
  text-shadow: 0 0 18px rgba(255,255,255,0.4);
}

.edit-image-wrapper img {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  border-radius: 18px;
  margin-bottom: 18px;
  box-shadow: 0 0 18px rgba(255,255,255,0.35);
}

.edit-image-wrapper label {
  display: block;
  margin: 16px 0 8px;
  font-weight: 600;
  letter-spacing: 1px;
}

.edit-image-wrapper input[type="file"] {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  outline: none;
}

.edit-image-wrapper input:focus {
  box-shadow: 0 0 14px white;
}

/* actions */
.edit-actions {
  display: flex;
  gap: 14px;
  margin-top: 22px;
}

.edit-actions button,
.edit-actions a {
  flex: 1;
  padding: 12px;
  border-radius: 16px;
  border: none;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  text-decoration: none;
  transition: 0.3s ease;
  text-align: center;
}

.save-btn {
  background: white;
  color: #770202;
}

.cancel-btn {
  border: 2px solid white;
  color: white;
}

.edit-actions button:hover,
.edit-actions a:hover {
  transform: scale(1.06);
  box-shadow: 0 0 28px rgba(255,255,255,0.8);
}
</style>
{% endblock %}

{% block content %}

<div class="edit-image-wrapper">
  <h2>🖼 Edit Image</h2>

  <img src="{{ image.image.url }}" alt="Current Image">

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Replace Image</label>
    <input type="file" name="image" accept="image/*" required>

    <div class="edit-actions">
      <button type="submit" class="save-btn">UPDATE</button>
      <a href="{% url 'manage_media' %}" class="cancel-btn">CANCEL</a>
    </div>
  </form>
</div>

{% endblock %}
