{% extends "base_admin.html" %}
{% block title %}Edit Video | Admin{% endblock %}

{% block extra_css %}
<style>
.edit-video-wrapper {
  max-width: 620px;
  margin: 50px auto 100px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  padding: 30px;
  border-radius: 26px;
  box-shadow: 0 0 40px rgba(255,255,255,0.25);
}

.edit-video-wrapper h2 {
  text-align: center;
  margin-bottom: 24px;
  letter-spacing: 3px;
  text-shadow: 0 0 18px rgba(255,255,255,0.5);
}

.video-preview {
  width: 100%;
  border-radius: 18px;
  margin-bottom: 18px;
  box-shadow: 0 0 20px rgba(255,255,255,0.35);
}

label {
  display: block;
  margin: 10px 0 8px;
  font-weight: 600;
  letter-spacing: 1px;
}

input[type="file"] {
  width: 100%;
  padding: 10px;
  border-radius: 14px;
  border: none;
  outline: none;
}

input[type="file"]:focus {
  box-shadow: 0 0 16px rgba(255,255,255,0.9);
}

/* actions */
.actions {
  display: flex;
  gap: 14px;
  margin-top: 22px;
}

.actions button,
.actions a {
  flex: 1;
  padding: 12px;
  border-radius: 16px;
  border: none;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  text-decoration: none;
  transition: 0.3s ease;
  text-align: center;
}

.save-btn {
  background: white;
  color: #770202;
}

.cancel-btn {
  border: 2px solid white;
  color: white;
  background: transparent;
}

.actions button:hover,
.actions a:hover {
  transform: scale(1.06);
  box-shadow: 0 0 28px rgba(255,255,255,0.8);
}
</style>
{% endblock %}

{% block content %}

<div class="edit-video-wrapper">

  <h2>🎬 Edit Video</h2>

  <video class="video-preview" controls>
    <source src="{{ video.video.url }}">
  </video>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Replace Video</label>
    <input type="file" name="video" accept="video/*" required>

    <div class="actions">
      <button type="submit" class="save-btn">UPDATE</button>
      <a href="{% url 'manage_media' %}" class="cancel-btn">CANCEL</a>
    </div>
  </form>

</div>

{% endblock %}
