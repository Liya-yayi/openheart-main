<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Login | OpenHeart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: radial-gradient(circle at top, #770202, #2b0000);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* floating background glow */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.08), transparent 40%);
  pointer-events: none;
}

/* card */
.login-container {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius: 24px;
  padding: 35px 30px 40px;
  box-shadow: 0 0 50px rgba(255,255,255,0.25);
  animation: fadeUp 0.8s ease both;
}

/* title */
.login-title {
  text-align: center;
  font-size: 32px;
  letter-spacing: 3px;
  margin-bottom: 25px;
  text-shadow: 0 0 25px rgba(255,255,255,0.6);
}

/* messages */
.error-message {
  background: rgba(255,255,255,0.15);
  color: #ffdede;
  padding: 12px;
  border-radius: 14px;
  text-align: center;
  margin-bottom: 18px;
  font-size: 14px;
  box-shadow: 0 0 12px rgba(255,255,255,0.25);
}

/* form */
label {
  font-size: 13px;
  letter-spacing: 1px;
  opacity: 0.85;
}

input {
  width: 100%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 14px;
  padding: 12px 14px;
  margin: 8px 0 18px;
  color: white;
  font-size: 14px;
}

input::placeholder { color: rgba(255,255,255,0.7); }

input:focus {
  outline: none;
  border-color: white;
  box-shadow: 0 0 14px rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.22);
}

/* button */
button {
  width: 100%;
  margin-top: 10px;
  padding: 13px;
  border-radius: 18px;
  border: none;
  background: white;
  color: #770202;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px white;
}

/* footer */
.register-text {
  text-align: center;
  margin-top: 25px;
  font-size: 13px;
  letter-spacing: 1px;
  opacity: 0.85;
}

.register-text a {
  color: white;
  font-weight: 700;
  text-decoration: none;
}

.register-text a:hover {
  text-shadow: 0 0 15px white;
}

/* animation */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(30px); }
  to   { opacity:1; transform: translateY(0); }
}

/* mobile */
@media (max-width: 500px) {
  .login-container {
    margin: 20px;
    padding: 28px 22px;
  }
}
</style>
</head>

<body>

<div class="login-container">

  <div class="login-title">User Login</div>

  {% if messages %}
    {% for message in messages %}
      <div class="error-message">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required>

    <button type="submit">Login</button>
  </form>

  <p class="register-text">
    New user?
    <a href="{% url 'user_register' %}">Create an account</a>
  </p>
  <p class="register-text" style="margin-top:12px;">
  <a href="{% url 'user_forgot_password' %}">Forgot password?</a>
</p>


</div>

</body>
</html>
