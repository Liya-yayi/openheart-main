{% extends "base_organizer.html" %}
{% load static %}

{% block title %}Delete Image | Organizer{% endblock %}

{% block extra_css %}
<style>

/* wrapper */
.delete-image-wrapper {
  max-width: 460px;
  margin: 40px auto 90px;
  padding: 20px;
}

/* glass card */
.delete-image-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius: 26px;
  padding: 34px 26px;
  box-shadow: 0 0 40px rgba(255,255,255,0.3);
  text-align: center;
  animation: fadeUp 0.9s ease both;
}

/* title */
.delete-image-card h2 {
  margin-top: 0;
  margin-bottom: 18px;
  font-size: 30px;
  letter-spacing: 3px;
  color: #ffdede;
  text-shadow: 0 0 20px rgba(255,255,255,0.4);
}

/* preview */
.delete-image-card img {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  border-radius: 16px;
  margin-bottom: 18px;
  box-shadow: 0 0 25px rgba(255,255,255,0.35);
}

/* text */
.delete-image-card p {
  font-size: 16px;
  margin-bottom: 26px;
  letter-spacing: 0.5px;
  opacity: 0.9;
}

/* buttons */
.delete-actions {
  display: flex;
  gap: 16px;
}

.delete-actions button,
.delete-actions a {
  flex: 1;
  padding: 12px;
  border-radius: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  text-decoration: none;
  text-align: center;
  transition: 0.3s ease;
}

/* confirm */
.delete-actions button {
  background: #ff3d3d;
  color: white;
  border: none;
  cursor: pointer;
}

.delete-actions button:hover {
  transform: scale(1.07);
  box-shadow: 0 0 25px rgba(255,60,60,0.9);
}

/* cancel */
.delete-actions a {
  background: white;
  color: #770202;
}

.delete-actions a:hover {
  transform: scale(1.07);
  box-shadow: 0 0 25px white;
}

/* animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* responsive */
@media (max-width: 520px) {
  .delete-actions {
    flex-direction: column;
  }
}

</style>
{% endblock %}

{% block content %}

<div class="delete-image-wrapper">

  <div class="delete-image-card">

    <h2>Delete Image</h2>

    <img src="{{ image.image.url }}" alt="Event Image">

    <p>Are you sure you want to permanently delete this image?</p>

    <form method="POST">
      {% csrf_token %}
      <div class="delete-actions">
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'view_events' %}">Cancel</a>
      </div>
    </form>

  </div>

</div>

{% endblock %}
