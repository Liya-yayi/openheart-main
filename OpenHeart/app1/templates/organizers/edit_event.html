{% extends "base_organizer.html" %}
{% load static %}

{% block title %}Edit Event | Organizer{% endblock %}

{% block extra_css %}
<style>

/* wrapper */
.edit-event-wrapper {
  max-width: 620px;
  margin: 30px auto 90px;
  padding: 20px;
}

/* glass form */
.form-card {
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(18px);
  border-radius: 26px;
  padding: 30px 26px;
  box-shadow: 0 0 45px rgba(255,255,255,0.3);
}

/* title */
.form-card h2 {
  text-align: center;
  margin-top: 0;
  margin-bottom: 28px;
  font-size: 34px;
  letter-spacing: 3px;
  color: #ffdede;
  text-shadow: 0 0 20px rgba(255,255,255,0.45);
}

/* labels */
.form-card label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  letter-spacing: 1px;
  opacity: 0.9;
}

/* inputs */
.form-card input,
.form-card textarea,
.form-card select {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 18px;
  border-radius: 14px;
  border: none;
  outline: none;
  font-size: 14px;
}

.form-card textarea {
  resize: vertical;
  min-height: 90px;
}

.form-card input:focus,
.form-card textarea:focus,
.form-card select:focus {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
}

/* group box */
#groupBox {
  background: rgba(255,255,255,0.12);
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 18px;
}

/* button */
.form-card button {
  width: 100%;
  padding: 15px;
  background: white;
  color: #770202;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: 0.3s ease;
  margin-top: 10px;
}

.form-card button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px white;
}

/* responsive */
@media (max-width: 600px) {
  .form-card h2 {
    font-size: 26px;
  }
}

</style>
{% endblock %}

{% block content %}

<div class="edit-event-wrapper">

  <div class="form-card">

    <h2>Edit Event</h2>

    <form method="POST">
      {% csrf_token %}

      <label>Title</label>
      <input type="text" name="title" value="{{ event.title }}" required>

      <label>Description</label>
      <textarea name="description" required>{{ event.description }}</textarea>

     

      <label>Event Type</label>
      <select name="event_type" id="event_type" onchange="toggleParticipants()" required>
        <option value="single" {% if event.event_type == 'single' %}selected{% endif %}>Single</option>
        <option value="group" {% if event.event_type == 'group' %}selected{% endif %}>Group</option>
      </select>

      <!-- GROUP ONLY -->
      <div id="groupBox" {% if event.event_type != 'group' %}style="display:none;"{% endif %}>
        <label>Number of Participants</label>
        <input type="number"
               name="max_participants"
               id="max_participants"
               value="{{ event.max_participants }}"
               min="1">
      </div>

      <label>Event Date</label>
      <input type="date"
             name="event_date"
             value="{{ event.event_date|date:'Y-m-d' }}"
             required>

      <label>Venue</label>
      <input type="text" name="venue" value="{{ event.venue }}" required>

      <button type="submit">Update Event</button>
    </form>

  </div>

</div>

<script>
function toggleParticipants() {
  const eventType = document.getElementById("event_type").value;
  const groupBox = document.getElementById("groupBox");

  if (eventType === "group") {
    groupBox.style.display = "block";
  } else {
    groupBox.style.display = "none";
    document.getElementById("max_participants").value = "";
  }
}
</script>

{% endblock %}
