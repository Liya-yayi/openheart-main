{% extends "base_organizer.html" %}
{% load static %}

{% block title %}Add Image | Organizer{% endblock %}

{% block extra_css %}
<style>

/* wrapper */
.add-image-wrapper {
  max-width: 460px;
  margin: 40px auto 80px;
  padding: 20px;
}

/* glass card */
.image-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius: 24px;
  padding: 34px 26px;
  box-shadow: 0 0 40px rgba(255,255,255,0.3);
  text-align: center;
  animation: fadeUp 1s ease both;
}

/* title */
.image-card h2 {
  margin-top: 0;
  margin-bottom: 10px;
  font-size: 30px;
  letter-spacing: 2px;
  color: #ffdede;
  text-shadow: 0 0 20px rgba(255,255,255,0.4);
}

.image-card h3 {
  margin-bottom: 24px;
  font-weight: 400;
  opacity: 0.85;
  letter-spacing: 1px;
}

/* file input */
.image-card input[type="file"] {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: white;
  font-size: 14px;
  cursor: pointer;
  margin-top: 10px;
}

.image-card input[type="file"]:focus {
  outline: none;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
}

/* button */
.image-card button {
  width: 100%;
  margin-top: 26px;
  padding: 14px;
  background: white;
  color: #770202;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: 0.3s ease;
}

.image-card button:hover {
  transform: scale(1.06);
  box-shadow: 0 0 30px white;
}

/* animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* responsive */
@media (max-width: 520px) {
  .image-card {
    padding: 26px 20px;
  }
  .image-card h2 {
    font-size: 24px;
  }
}

</style>
{% endblock %}

{% block content %}

<div class="add-image-wrapper">

  <div class="image-card">

    <h2>Add Image</h2>
    <h3>{{ event.title }}</h3>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <input type="file" name="image" required>

      <button type="submit">Upload Image</button>
    </form>

  </div>

</div>

{% endblock %}
