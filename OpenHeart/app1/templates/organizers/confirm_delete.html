{% extends "base_organizer.html" %}
{% load static %}

{% block title %}Delete Event | Organizer{% endblock %}

{% block extra_css %}
<style>

/* wrapper */
.delete-wrapper {
  max-width: 460px;
  margin: 40px auto 90px;
  padding: 20px;
}

/* glass card */
.delete-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius: 26px;
  padding: 36px 28px;
  box-shadow: 0 0 40px rgba(255,255,255,0.3);
  text-align: center;
  animation: fadeUp 0.9s ease both;
}

/* title */
.delete-card h2 {
  margin-top: 0;
  margin-bottom: 16px;
  font-size: 32px;
  letter-spacing: 3px;
  color: #ffdede;
  text-shadow: 0 0 20px rgba(255,255,255,0.4);
}

/* text */
.delete-card p {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 28px;
  opacity: 0.9;
}

.delete-card strong {
  color: #ffb3b3;
  font-size: 18px;
}

/* actions */
.delete-actions {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-top: 10px;
}

/* buttons */
.delete-btn {
  padding: 12px 22px;
  background: #ff3d3d;
  color: white;
  border: none;
  border-radius: 18px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.3s ease;
}

.delete-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(255,80,80,0.9);
}

.cancel-link {
  padding: 12px 22px;
  border: 2px solid white;
  border-radius: 18px;
  color: white;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  transition: 0.3s ease;
}

.cancel-link:hover {
  background: white;
  color: #770202;
  box-shadow: 0 0 20px white;
}

/* animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* responsive */
@media (max-width: 500px) {
  .delete-actions {
    flex-direction: column;
  }
}

</style>
{% endblock %}

{% block content %}

<div class="delete-wrapper">

  <div class="delete-card">

    <h2>Delete Event</h2>

    <p>
      Are you sure you want to permanently delete  
      <br>
      <strong>{{ event.title }}</strong> ?
    </p>

    <form method="POST">
      {% csrf_token %}

      <div class="delete-actions">
        <button type="submit" class="delete-btn">Yes, Delete</button>
        <a href="{% url 'view_events' %}" class="cancel-link">Cancel</a>
      </div>
    </form>

  </div>

</div>

{% endblock %}
