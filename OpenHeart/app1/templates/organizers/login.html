<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Organizer Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #770202, #2b0000);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* login card */
.login-container {
  width: 100%;
  max-width: 400px;
  padding: 36px 30px;
  border-radius: 26px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  box-shadow: 0 0 45px rgba(255,255,255,0.3);
}

/* title */
.login-container h2 {
  text-align: center;
  margin-bottom: 28px;
  font-size: 30px;
  letter-spacing: 2px;
  color: #ffdede;
  text-shadow: 0 0 18px rgba(255,255,255,0.4);
}

/* inputs */
.login-container input {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 16px;
  border-radius: 14px;
  border: none;
  outline: none;
  font-size: 14px;
}

.login-container input::placeholder {
  color: #777;
}

.login-container input:focus {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
}

/* button */
.login-container button {
  width: 100%;
  padding: 14px;
  background: white;
  color: #770202;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: 0.3s ease;
}

.login-container button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px white;
}

/* error */
.error-message {
  background: rgba(255,255,255,0.18);
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="login-container">

  <h2>Organizer Login</h2>

  <form method="POST">
    {% csrf_token %}

    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
  </form>
            <a href="{% url 'organizer_register' %}" style="color: white;">If you don't have account Register here</a>
<a href="{% url 'forgot_password' %}" style="color:#ffdede; display:block; text-align:center; margin-top:14px;">
  Forgot password?
</a>

  {% for message in messages %}
    <div class="error-message">{{ message }}</div>
  {% endfor %}

</div>

</body>
</html>
