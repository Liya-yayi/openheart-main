<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password | OpenHeart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: radial-gradient(circle at top, #770202, #2b0000);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.08), transparent 40%);
  pointer-events: none;
}

/* card */
.reset-container {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius: 24px;
  padding: 35px 30px 40px;
  box-shadow: 0 0 45px rgba(255,255,255,0.25);
  animation: fadeUp 0.8s ease both;
  text-align: center;
}

.reset-container h2 {
  font-size: 30px;
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-shadow: 0 0 22px rgba(255,255,255,0.6);
}

.subtitle {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 25px;
}

/* input */
input {
  width: 100%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 22px;
  color: white;
  font-size: 15px;
}

input::placeholder { 
  color: rgba(255,255,255,0.7);
}

input:focus {
  outline: none;
  border-color: white;
  box-shadow: 0 0 14px rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.22);
}

/* button */
button {
  width: 100%;
  padding: 13px;
  border-radius: 18px;
  border: none;
  background: white;
  color: #770202;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px white;
}

/* messages */
.msg {
  margin-top: 18px;
  background: rgba(255,255,255,0.18);
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}

/* animation */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(30px); }
  to   { opacity:1; transform: translateY(0); }
}

@media (max-width:500px){
  .reset-container { margin: 20px; }
}
</style>
</head>

<body>

<div class="reset-container">

  <form method="POST">
    {% csrf_token %}

    <h2>Reset Password</h2>
    <div class="subtitle">Create a new strong password</div>

    <input type="password" name="password" placeholder="Enter new password" required>

    <button type="submit">Update Password</button>
  </form>

  {% for message in messages %}
    <div class="msg">{{ message }}</div>
  {% endfor %}

</div>

</body>
</html>
